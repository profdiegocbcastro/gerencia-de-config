apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: cefet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: cefet-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_NAME
          value: cefet
        - name: DB_USER
          value: admin
        - name: DB_PASSWORD
          value: senha123
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
