services:
  localstack:
    image: localstack/localstack:3.8
    container_name: localstack-k8s
    ports:
      - "4566:4566"
    environment:
      - SERVICES=rds
      - DEFAULT_REGION=us-east-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:4566/_localstack/health | grep -q 'edition'"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
