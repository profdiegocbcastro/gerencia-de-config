services:
  floci:
    image: floci/floci:latest
    container_name: floci
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/ > /dev/null 2>&1; exit 0"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s
