apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: react-orange-hpa
  namespace: homolog

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: react-orange

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 50