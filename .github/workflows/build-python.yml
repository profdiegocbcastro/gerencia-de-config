name: CI-CD API Python

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "APIs para exercícios/api-python"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar build
        run: |
          python -m py_compile app.py

  docker:
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: "APIs para exercícios/api-python"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PWD }}

      - name: Build da imagem
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/alunos-api:latest .

      - name: Push da imagem
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/alunos-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy via hook Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}