name: Deploy Homologação + DAST

on:
  workflow_call:
      secrets:
        RENDER_DEPLOY_HOOK:
          required: true

jobs:
  deploy-homolog:
    name: Deploy em Homolog
    runs-on: ubuntu-latest

    steps:
      - name: Deploy no Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  dast:
    name: DAST com OWASP ZAP
    runs-on: ubuntu-latest
    needs: deploy-homolog

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Corrigir permissões
        run: chmod -R 777 .

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: https://gerencia-de-config.onrender.com
          fail_action: true